services:
  db:
    image: postgres:16
    container_name: landedcost-db
    environment:
      POSTGRES_DB: landedcost
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - landedcost-data:/var/lib/postgresql/data

volumes:
  landedcost-data: